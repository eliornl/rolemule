extensions:
  - addsTo:
      pack: codeql/python-all
      extensible: barrierModel
    data:
      # Return values of ApplyPilot logging helpers stop log-injection taint.
      - ["utils", "Member[logging_config].Member[sanitize_log_value].ReturnValue", "log-injection", "manual"]
      - ["utils", "Member[logging_config].Member[mask_email].ReturnValue", "log-injection", "manual"]
      - ["utils", "Member[logging_config].Member[redact_sensitive_data].ReturnValue", "log-injection", "manual"]
      # request_middleware re-exports the same sanitizer.
      - ["utils", "Member[request_middleware].Member[_sanitize_log_value].ReturnValue", "log-injection", "manual"]
