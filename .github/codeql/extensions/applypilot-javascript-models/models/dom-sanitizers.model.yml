extensions:
  - addsTo:
      pack: codeql/javascript-all
      extensible: barrierModel
    data:
      # Global sanitizers from ui/static/js/dom-security.js (window.*)
      - [".", "Member[window].Member[escapeHtml].ReturnValue", "xss", 0]
      - [".", "Member[window].Member[escapeHtml].ReturnValue", "dom-xss", 0]
      - [".", "Member[window].Member[escapeHtml].ReturnValue", "double-escaping", 0]
      - [".", "Member[window].Member[decodeEntities].ReturnValue", "double-escaping", 0]
      - [".", "Member[window].Member[sanitizeLogValue].ReturnValue", "log-injection", 0]
      - [".", "Member[window].Member[stripHtmlForAlert].ReturnValue", "xss", 0]
      - [".", "Member[window].Member[stripHtmlForAlert].ReturnValue", "dom-xss", 0]
      - [".", "Member[window].Member[validateRelativeRedirectPath].ReturnValue", "client-side-unvalidated-url-redirection", 0]
      # Extension autofill: decode HTML entities before writing form values
      - [".", "Member[window].Member[decodeHtmlEntities].ReturnValue", "double-escaping", 0]
