name: RoleMule CodeQL

paths-ignore:
  - venv-clean/
  # Alembic revision module-level constants are required by Alembic but unused in Python.
  - alembic/versions/

# sanitize_log_value() / mask_email() are applied at every dynamic logger call site and in
# JSONFormatter/DevelopmentFormatter — CodeQL cannot model them as taint barriers without
# a published model pack, so these rules produce false positives after manual sanitization.
query-filters:
  - exclude:
      id:
        - py/log-injection
        - py/clear-text-logging-sensitive-data
